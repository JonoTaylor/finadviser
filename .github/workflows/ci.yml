name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — lint + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint -- --max-warnings 50
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Vitest
        run: npm test
      - name: Drizzle — migrations up to date
        env:
          DATABASE_URL: postgres://placeholder
        run: |
          npx drizzle-kit generate --name ci-check > /dev/null
          if ! git diff --quiet drizzle/; then
            echo "::error::drizzle/ has uncommitted changes — run 'npx drizzle-kit generate' and commit the result." >&2
            git status drizzle/
            git --no-pager diff drizzle/
            exit 1
          fi
